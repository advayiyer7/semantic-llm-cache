services:
  api:
    build: .
    # Bind to localhost — front with a reverse proxy/auth before exposing publicly.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      # Override host-centric defaults for the container network.
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis

  redis:
    image: redis/redis-stack:latest
    # Localhost-only: the cache holds prompts/responses in plaintext.
    ports:
      - "127.0.0.1:6379:6379"   # Redis
      - "127.0.0.1:8001:8001"   # RedisInsight UI
    volumes:
      - redis-data:/data

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      # Set GRAFANA_ADMIN_PASSWORD in .env. Left unset, Grafana forces a password
      # change on first login rather than shipping a known default.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  redis-data:
